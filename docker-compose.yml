services:
  api:
    build: ./Idiomas.Core
    container_name: idiomas-api
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - 5076:5076
    networks:
      - idiomas-network

  database:
    build: ./Idiomas.Core/Infrastructure/Database/Docker
    container_name: idiomas-database
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_TCP_PORT: 1433
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - idiomas-network

  migration:
    build:
      context: ./Idiomas.Core
      target: build
    container_name: idiomas-migration
    depends_on:
      database:
        condition: service_healthy
    entrypoint: ["sh", "-c", "echo 'Waiting for database...' && sleep 30 && echo 'Testing connection...' && dotnet ef database update --context ApplicationContext --verbose 2>&1 || echo 'Migration failed, exiting'"]
    env_file:
      - .env
    networks:
      - idiomas-network

volumes:
  mssql_data:

networks:
  idiomas-network:
    driver: bridge